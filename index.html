<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF5722" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="맛집큐레이션" />
  <title>맛집 큐레이션</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 홈 뷰 -->
  <div id="view-home" class="view active">
    <div class="home-container">
      <div class="home-logo">🍽️</div>
      <h1 class="home-title">맛집 큐레이션</h1>
      <p class="home-desc">현위치 기반으로<br>주변 맛집을 랭킹순으로 알려드려요</p>
      <button id="btn-find" class="btn-primary">내 주변 맛집 찾기</button>
      <p id="home-error" class="home-error hidden"></p>
    </div>
  </div>

  <!-- 결과 뷰 -->
  <div id="view-result" class="view hidden">

    <!-- 헤더 -->
    <header class="app-header">
      <button id="btn-back" class="icon-btn" aria-label="홈으로">←</button>
      <h1 class="header-title">맛집 큐레이션</h1>
      <button id="btn-refresh" class="icon-btn" aria-label="새로고침">↺</button>
    </header>

    <!-- 거리 필터 -->
    <div class="filter-bar distance-filter">
      <button class="filter-btn dist-btn" data-dist="500">500m</button>
      <button class="filter-btn dist-btn active" data-dist="1000">1km</button>
      <button class="filter-btn dist-btn" data-dist="3000">3km</button>
      <button class="filter-btn dist-btn" data-dist="5000">5km</button>
    </div>

    <!-- 카테고리 필터 -->
    <div class="filter-bar category-filter">
      <button class="filter-btn cat-btn active" data-cat="전체">전체</button>
      <button class="filter-btn cat-btn" data-cat="한식">🍚 한식</button>
      <button class="filter-btn cat-btn" data-cat="패스트푸드">🍔 패스트푸드</button>
      <button class="filter-btn cat-btn" data-cat="기타">🍽️ 기타</button>
    </div>

    <!-- 현재 상태 표시 -->
    <div id="result-status" class="result-status"></div>

    <!-- 로딩 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>맛집을 찾는 중...</p>
    </div>

    <!-- 카드 목록 -->
    <div id="card-list" class="card-list"></div>

  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
